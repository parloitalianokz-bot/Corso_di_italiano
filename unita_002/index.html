 <!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>

    <!-- OVERLAY DI LOGIN -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>Benvenuti in classe! 🇮🇹</h2>
            <p class="login-subtitle">Inserisci il tuo nome per iniziare la lezione</p>
            <input type="text" id="username-input" placeholder="Il tuo nome">
            <select id="group-select" style="width: 100%; padding: 10px; margin: 10px 0;">
                <option value="Venezia">Gruppo Venezia</option>
                <option value="Milano">Gruppo Milano</option>
            </select>
            <button onclick="entraInClasse()">Entra</button>
        </div>

    <!-- CONTENITORE PRINCIPALE -->
    <div class="main-container">
        <!-- Pulsante Esci -->
        <div style="text-align: right; margin-bottom: 10px;">
            <button onclick="esciDallaClasse()" class="btn-esci">Esci 🚪</button>
        </div>

        <div class="header">
            <!-- Badge Studente -->
            <div id="user-info-badge" class="user-badge"></div>
            <h1 id="titolo-lezione">Caricamento...</h1>
            <p id="sottotitolo-lezione" class="subtitle"></p>
        </div>
        
        <div style="text-align: center; margin-bottom: 25px;">
            <img id="banner-lezione" src="" style="max-width: 100%; border-radius: 8px; display: none;">
        </div>
        <div id="contenitore-dinamico"></div>
    </div>


    <!-- ========================================================================= -->
    <!-- SCRIPT 1: LA CASSAFORTE DEL LOGIN (BLINDATO) -->
    <!-- Nessun errore futuro potrà mai bloccare questo script -->
    <!-- ========================================================================= -->
    <script type="module">
        import { RegistroCorso } from "../studenti.js";
        
        // Legge chi è connesso
        const myUserName = localStorage.getItem('parlo_italiano_username') || "";
        const myGroup = localStorage.getItem('parlo_italiano_group') || "default";
        
        // Nasconde il login se siamo già connessi
        const logOverlay = document.getElementById('login-overlay');
        if (myUserName && logOverlay) {
            logOverlay.style.display = 'none';
        }

        // Funzione per entrare
        window.entraInClasse = function() {
            const usrInp = document.getElementById('username-input');
            const grpInp = document.getElementById('group-select');
            if (!usrInp || !grpInp) return;
            
            const nameInput = usrInp.value.trim();
            const groupInput = grpInp.value;

            const gruppoInfo = RegistroCorso[groupInput];
            if (!gruppoInfo || !gruppoInfo.studenti.find(s => s.toLowerCase() === nameInput.toLowerCase())) {
                return alert("Accesso negato o gruppo errato.");
            }

            localStorage.setItem('parlo_italiano_username', nameInput); 
            localStorage.setItem('parlo_italiano_group', groupInput);
            location.reload(); 
        };

        // Funzione per uscire
        window.esciDallaClasse = function() {
            if (confirm("Vuoi uscire dalla classe?")) {
                localStorage.removeItem('parlo_italiano_username');
                localStorage.removeItem('parlo_italiano_group');
                location.reload();
            }
        };
    </script>


    <!-- ========================================================================= -->
    <!-- SCRIPT 2: IL MOTORE DELLA LEZIONE E FIREBASE (Modificabile in futuro) -->
    <!-- ========================================================================= -->
    <script type="module">
        import { initLezione } from "../motore-lezione.js";
        import { ConfigLezione } from "./dati-lezione.js";
        import { RegistroCorso } from "../studenti.js";
        import { db } from "../config-firebase.js";
        import { getDatabase, ref, set, onValue, push, remove, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        
        // Recupera i dati utente
        const myUserName = localStorage.getItem('parlo_italiano_username') || "";
        const myGroup = localStorage.getItem('parlo_italiano_group') || "default";
        const mySessionId = "user_" + Math.random().toString(36).substr(2, 9);

     let isDocente = false;
        const gruppoCorrente = RegistroCorso[myGroup];
        if (gruppoCorrente) {
            const userLow = myUserName.toLowerCase();
            
            // Controlliamo in modo sicuro se l'utente ha il ruolo di docente o supporto nella lista (array)
            const ruoliDocente = Array.isArray(gruppoCorrente.docenteRuolo) ? gruppoCorrente.docenteRuolo : [];
            const ruoliSupporto = Array.isArray(gruppoCorrente.docenteSupporto) ? gruppoCorrente.docenteSupporto : [];
            
            if (ruoliDocente.some(d => d.toLowerCase() === userLow) || ruoliSupporto.some(s => s.toLowerCase() === userLow)) {
                isDocente = true;
            }
        }
        
        // Blocca l'esecuzione se non siamo loggati (lo script 1 gestisce il login)
        if (!myUserName) throw new Error("Utente non loggato. Attesa login.");
        

        // ==========================================
        // INIZIALIZZAZIONE MOTORE LEZIONE
        // ==========================================
        const BASE_PATH = `${ConfigLezione?.idFirebase || "lezione_default"}/${myGroup}`;
        
        // 1. AVVIAMO IL MOTORE! (Creerà i titoli e la grafica in automatico)
        initLezione(ConfigLezione, {
            myUserName: myUserName,
            myGroup: myGroup,
            isDocente: isDocente
        });


        // ==========================================
        // FUNZIONI DI SUPPORTO (Lavagna, UI)
        // ==========================================
        

        window.toggleAccordion = function(id) {
    const content = document.getElementById('content_' + id);
    const arrow = content.previousElementSibling.querySelector('span');
    
    if (content.style.display === "block") {
        content.style.display = "none";
        arrow.innerText = "▼";
        // Rimuoviamo il salvataggio quando chiudiamo
        localStorage.removeItem('last_open_accordion'); 
    } else {
        content.style.display = "block";
        arrow.innerText = "▲";
        // Salviamo l'ID della scheda aperta
        localStorage.setItem('last_open_accordion', id); 
    }
};

        window.scrollSlider = function(direction) {
            const container = document.getElementById('flashcard-slider');
            if (container) container.scrollBy({ left: direction * (container.offsetWidth * 0.7), behavior: 'smooth' });
        };

       window.scrollSliderCibo = function(direction) {
    const container = document.getElementById('flashcard-slider-cibo');
    if (!container) return;
    
    // Calcola la larghezza di una card + gap
    const cardWidth = container.querySelector('.flashcard-item')?.offsetWidth || 160;
    const gap = 15;
    const scrollAmount = (cardWidth + gap) * direction;
    
    container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
};

     
     window.scrollSliderBevande = function(direction) {
    const container = document.getElementById('flashcard-slider-bevande');
    if (!container) return;
    
    const cardWidth = container.querySelector('.flashcard-item')?.offsetWidth || 160;
    const gap = 15;
    const scrollAmount = (cardWidth + gap) * direction;
    
    container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
};

        

        // ==========================================
        // GENERAZIONE HTML DOM 
        // ==========================================
        



     // --- AUTO-RIPRISTINO SCHEDA APERTA ---
window.addEventListener('load', () => {
    const lastOpen = localStorage.getItem('last_open_accordion');
    if (lastOpen) {
        const el = document.getElementById('content_' + lastOpen);
        if (el) {
            el.style.display = 'block';
            const header = el.previousElementSibling;
            if(header) {
                header.querySelector('span').innerText = "▲";
            }
        }
    }
});

     

        // ==========================================
        // LOGICA FIREBASE: BACHECA MESSAGGI
        // ==========================================
        window.eliminaMessaggio = function(boardKey, messageId) { if(confirm("Vuoi cancellare questo messaggio?")) remove(ref(db, `${BASE_PATH}/messages_${boardKey}/${messageId}`)); };


        


// ==========================================
// LOGICA CATEGORIE ETÀ
// ==========================================

// Funzione per scegliere una categoria
window.scegliCategoria = function(categoriaId) {
    // Invia la scelta a Firebase
    set(ref(db, `${BASE_PATH}/categorie_eta/${myUserName}`), {
        categoria: categoriaId,
        nome: myUserName,
        timestamp: Date.now()
    });
    
    // Feedback visivo: evidenzia l'immagine cliccata
    document.querySelectorAll('[id^="img_cat_"]').forEach(img => {
        img.style.borderColor = '#ddd';
        img.style.borderWidth = '3px';
    });
    const img = document.getElementById(`img_cat_${categoriaId}`);
    if (img) {
        img.style.borderColor = 'var(--primary-color)';
        img.style.borderWidth = '4px';
    }
};

// Funzione per eliminare la risposta di un singolo utente (SOLO DOCENTE)
window.eliminaRispostaCategoria = function(userId) {
    if (!confirm(`⚠️ Cancellare la risposta di questo studente?`)) {
        return;
    }
    
    remove(ref(db, `${BASE_PATH}/categorie_eta/${userId}`))
        .then(() => {
            console.log(`Risposta eliminata per: ${userId}`);
        })
        .catch((error) => {
            console.error("Errore durante l'eliminazione:", error);
            alert("❌ Errore durante l'eliminazione.");
        });
};


     // ==========================================
// LOGICA BRAINSTORMING (FORUM RISPOSTE)
// ==========================================

// Funzione per salvare la risposta
window.salvaRispostaBrainstorming = function(attivitaId) {
    const textarea = document.getElementById(`textarea_brainstorming_${attivitaId}`);
    if (!textarea) return;
    
    const testo = textarea.value.trim();
    if (testo === "") {
        alert("Scrivi qualcosa prima di salvare!");
        return;
    }
    
    // Salva su Firebase (set sovrascrive la risposta dello studente)
    set(ref(db, `${BASE_PATH}/brainstorming/${attivitaId}/${myUserName}`), {
        testo: testo,
        author: myUserName,
        timestamp: Date.now(),
        likes: {}  // Inizializza l'oggetto likes vuoto
    });
    
    // Disabilita la textarea
    textarea.disabled = true;
    
    // Nasconde pulsante Salva, mostra Modifica
    document.getElementById(`btn_salva_brainstorming_${attivitaId}`).style.display = 'none';
    document.getElementById(`btn_modifica_brainstorming_${attivitaId}`).style.display = 'inline-block';
};

// Funzione per modificare la risposta
window.modificaRispostaBrainstorming = function(attivitaId) {
    const textarea = document.getElementById(`textarea_brainstorming_${attivitaId}`);
    if (!textarea) return;
    
    // Abilita la textarea
    textarea.disabled = false;
    textarea.focus();
    
    // Nasconde pulsante Modifica, mostra Salva
    document.getElementById(`btn_modifica_brainstorming_${attivitaId}`).style.display = 'none';
    document.getElementById(`btn_salva_brainstorming_${attivitaId}`).style.display = 'inline-block';
};

// Funzione per gestire il "Mi piace"
window.mettiLikeBrainstorming = function(attivitaId, userId) {
    // Non permettere like sulla propria risposta
    if (userId === myUserName) {
        alert("Non puoi mettere 'Mi piace' alla tua risposta!");
        return;
    }
    
    const likeRef = ref(db, `${BASE_PATH}/brainstorming/${attivitaId}/${userId}/likes/${myUserName}`);
    
    // Leggi lo stato attuale del like
    get(likeRef).then((snapshot) => {
        const haGiaMessoLike = snapshot.val() === true;
        // Toggle: se ha già messo like, lo toglie; altrimenti lo aggiunge
        set(likeRef, !haGiaMessoLike);
    });
};

// Funzione per eliminare una risposta (solo docente)
window.eliminaRispostaBrainstorming = function(attivitaId, userId) {
    if (!confirm(`⚠️ Cancellare la risposta di questo studente?`)) {
        return;
    }
    remove(ref(db, `${BASE_PATH}/brainstorming/${attivitaId}/${userId}`));
};

     // Funzione per convertire un numero in lettere (da 0 a 100)
window.convertiNumeroInLettere = function(numero) {
    if (!ConfigLezione?.elicitazione?.numeriEta) return "";
    const found = ConfigLezione.elicitazione.numeriEta.find(item => item.numero === parseInt(numero));
    return found ? found.lettere : "";
};

     // Funzione per salvare l'età (versione speciale per "eta")
window.salvaEta = function(attivitaId) {
    const input = document.getElementById(`input_eta_${attivitaId}`);
    if (!input) return;
    
    const eta = parseInt(input.value.trim());
    if (isNaN(eta) || eta < 0 || eta > 100) {
        alert("Inserisci un numero valido tra 0 e 100!");
        return;
    }
    
    const lettere = window.convertiNumeroInLettere(eta);
    if (!lettere) {
        alert("Numero non riconosciuto!");
        return;
    }
    
    // Salva su Firebase con il testo già formattato
    // Lo studente vedrà "Io ho X anni." nella sua risposta
    set(ref(db, `${BASE_PATH}/brainstorming/${attivitaId}/${myUserName}`), {
        eta: eta,
        lettere: lettere,
        author: myUserName,
        timestamp: Date.now(),
        likes: {}
    });
    
    // Disabilita l'input e mostra i pulsanti giusti
    input.disabled = true;
    document.getElementById(`btn_salva_eta_${attivitaId}`).style.display = 'none';
    document.getElementById(`btn_modifica_eta_${attivitaId}`).style.display = 'inline-block';
    
    // Aggiorna l'anteprima
    const preview = document.getElementById(`anteprima_eta_${attivitaId}`);
    if (preview) {
        preview.innerHTML = `📝 In lettere: <strong>${lettere}</strong> anni`;
    }
};

     // Funzione per modificare l'età
window.modificaEta = function(attivitaId) {
    const input = document.getElementById(`input_eta_${attivitaId}`);
    if (!input) return;
    
    input.disabled = false;
    input.focus();
    
    document.getElementById(`btn_modifica_eta_${attivitaId}`).style.display = 'none';
    document.getElementById(`btn_salva_eta_${attivitaId}`).style.display = 'inline-block';
};

    // --- ANTEPRIMA IN TEMPO REALE PER L'ETÀ ---
// Questo codice aggiorna automaticamente l'anteprima in lettere mentre lo studente scrive
const inputEta = document.getElementById('input_eta_eta');
if (inputEta) {
    inputEta.addEventListener('input', function() {
        const eta = parseInt(this.value);
        const preview = document.getElementById('anteprima_eta_eta');
        const btnSalva = document.getElementById('btn_salva_eta_eta');
        
        if (preview) {
            if (isNaN(eta) || eta < 0 || eta > 100) {
                preview.innerHTML = '📝 In lettere: <span style="color: #999; font-weight: normal;">Inserisci un numero valido (0-100)...</span>';
                if (btnSalva) btnSalva.style.display = 'none';
            } else {
                const lettere = window.convertiNumeroInLettere(eta);
                if (lettere) {
                    preview.innerHTML = `📝 In lettere: <strong>${lettere}</strong> anni`;
                    // Mostra il pulsante Salva quando il numero è valido
                    if (btnSalva) btnSalva.style.display = 'inline-block';
                }
            }
        }
    });
}
     
     

// --- ASCOLTATORE: Risposte brainstorming ---
ConfigLezione.elicitazione.domandeBrainstorming?.forEach(item => {
    const attivitaId = item.id;
    
    onValue(ref(db, `${BASE_PATH}/brainstorming/${attivitaId}`), (snapshot) => {
        const data = snapshot.val() || {};
        const container = document.getElementById(`risposte_brainstorming_${attivitaId}`);
        if (!container) return;
        
        const sortedKeys = Object.keys(data).sort((a, b) => (data[a].timestamp || 0) - (data[b].timestamp || 0));
        
        if (sortedKeys.length === 0) {
            container.innerHTML = '<p style="color: #999; font-style: italic;">Ancora nessuna risposta...</p>';
            return;
        }
        
        let html = '';
        sortedKeys.forEach(userId => {
            const item = data[userId];
            const likesCount = item.likes ? Object.values(item.likes).filter(v => v === true).length : 0;
            const haMessoLike = item.likes && item.likes[myUserName] === true;
            
            let testoMostrato;
            if (attivitaId === "eta") {
                if (userId === myUserName) {
                    testoMostrato = `Io ho ${item.eta} anni.`;
                } else {
                    testoMostrato = `${item.author} ha ${item.eta} anni.`;
                }
            } else {
                testoMostrato = item.testo;
            }
            
            const deleteBtn = isDocente ? `
                <button onclick="eliminaRispostaBrainstorming('${attivitaId}', '${userId}')" 
                        style="background: #e74c3c; color: white; border: none; border-radius: 4px; padding: 2px 10px; cursor: pointer; font-size: 0.8em;">
                    ✖️
                </button>
            ` : '';
            
            html += `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee;">
                    <div style="flex-grow: 1;">
                        <b>${item.author}</b>: ${testoMostrato}
                        <button onclick="mettiLikeBrainstorming('${attivitaId}', '${userId}')" 
                                style="background: none; border: none; cursor: pointer; font-size: 1em; margin-left: 10px; ${haMessoLike ? 'color: #3498db;' : 'color: #999;'}">
                            👍 ${likesCount > 0 ? likesCount : ''}
                        </button>
                    </div>
                    ${deleteBtn}
                </div>
            `;
        });
        container.innerHTML = html;
    });
    
    // --- RIPRISTINO STATO PER LO STUDENTE ---
    const studenteRef = ref(db, `${BASE_PATH}/brainstorming/${attivitaId}/${myUserName}`);
    onValue(studenteRef, (snapshot) => {
        const data = snapshot.val();
        
        if (attivitaId === "eta") {
            const input = document.getElementById(`input_eta_${attivitaId}`);
            const btnSalva = document.getElementById(`btn_salva_eta_${attivitaId}`);
            const btnModifica = document.getElementById(`btn_modifica_eta_${attivitaId}`);
            const preview = document.getElementById(`anteprima_eta_${attivitaId}`);
            
            if (!input || !btnSalva || !btnModifica) return;
            
            if (data && data.eta !== undefined) {
                input.value = data.eta;
                input.disabled = true;
                btnSalva.style.display = 'none';
                btnModifica.style.display = 'inline-block';
                if (preview) {
                    preview.innerHTML = `📝 In lettere: <strong>${data.lettere}</strong> anni`;
                }
            } else {
                input.value = '';
                input.disabled = false;
                btnSalva.style.display = 'inline-block';
                btnModifica.style.display = 'none';
                if (preview) {
                    preview.innerHTML = '📝 In lettere: <span style="color: #999; font-weight: normal;">Scrivi un numero per vedere la conversione...</span>';
                }
            }
        } else {
            const textarea = document.getElementById(`textarea_brainstorming_${attivitaId}`);
            const btnSalva = document.getElementById(`btn_salva_brainstorming_${attivitaId}`);
            const btnModifica = document.getElementById(`btn_modifica_brainstorming_${attivitaId}`);
            
            if (!textarea || !btnSalva || !btnModifica) return;
            
            if (data && data.testo) {
                textarea.value = data.testo;
                textarea.disabled = true;
                btnSalva.style.display = 'none';
                btnModifica.style.display = 'inline-block';
            } else {
                textarea.value = '';
                textarea.disabled = false;
                btnSalva.style.display = 'inline-block';
                btnModifica.style.display = 'none';
            }
        }
    });
});   // ← CHIUSURA DEL forEach di domandeBrainstorming

// --- ASCOLTATORE SPECIFICO PER "eta" (fuori da domandeBrainstorming) ---

// Ascoltatore per le scelte degli studenti (categorie età)
onValue(ref(db, `${BASE_PATH}/categorie_eta`), (snapshot) => {
    const data = snapshot.val() || {};
    
    // Raggruppa i nomi per categoria (con userId per il docente)
    const categorieNomi = {};
    Object.keys(data).forEach(userId => {
        const item = data[userId];
        if (!categorieNomi[item.categoria]) {
            categorieNomi[item.categoria] = [];
        }
        categorieNomi[item.categoria].push({
            nome: item.nome,
            userId: userId
        });
    });
    
    // Aggiorna i nomi sotto ogni categoria (per tutti)
    if (ConfigLezione?.elicitazione?.categorieEta) {
        ConfigLezione.elicitazione.categorieEta.forEach(cat => {
            const container = document.getElementById(`nomi_cat_${cat.id}`);
            if (container) {
                const utenti = categorieNomi[cat.id] || [];
                if (utenti.length === 0) {
                    container.innerHTML = '';
                } else {
                    container.innerHTML = `<span style="color: var(--primary-color); font-weight: bold;">${utenti.map(u => u.nome).join(', ')}</span>`;
                }
            }
        });
    }
    
    // --- PANNELLO DOCENTE (solo se isDocente è true) ---
    if (isDocente) {
        const panel = document.getElementById('risposte_categorie_docente');
        if (!panel) return;
        
        if (Object.keys(data).length === 0) {
            panel.innerHTML = '<p style="color: #999; font-style: italic;">Nessuna risposta ricevuta.</p>';
            return;
        }
        
        let html = '';
        Object.keys(data).forEach(userId => {
            const item = data[userId];
            html += `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #eee;">
                    <span><b>${item.nome}</b> → ${item.categoria}</span>
                    <button onclick="eliminaRispostaCategoria('${userId}')" 
                            style="background: #e74c3c; color: white; border: none; border-radius: 4px; padding: 2px 10px; cursor: pointer; font-size: 0.8em;"
                            onmouseover="this.style.transform='scale(1.1)'" 
                            onmouseout="this.style.transform='scale(1)'">
                        ✖️
                    </button>
                </div>
            `;

    let htmlBacheca = `<strong>Risultati del Gruppo:</strong><ul style="margin-top: 10px; padding-left: 20px;">`;
    domandaInfo.opzioni.forEach((testoOpt, idx) => {

            const icona = (idx === domandaInfo.corretta) ? "✅" : "❌";

                    </span>
                `).join('')}

        }
    });
    htmlBacheca += `</ul>`;

        // FUNZIONE PER SPOSTARE LA FRASE SU O GIÙ
        window.spostaFrase = function(exId, currentIndex, direzione) {
            const dbRef = ref(db, `${BASE_PATH}/riordino/${exId}/ordine`);
            get(dbRef).then((snapshot) => {
                if (snapshot.exists()) {
                    let ordine = snapshot.val();
                    let nuovoIndex = currentIndex + direzione;
                    
                    // Scambiamo di posto i due numeri nell'array
                    let temp = ordine[currentIndex];
                    ordine[currentIndex] = ordine[nuovoIndex];
                    ordine[nuovoIndex] = temp;
                    
                    // Salviamo su Firebase (la magia fa aggiornare gli schermi in tempo reale!)
                    set(dbRef, ordine);
                }
            });
        };

                                    <button onclick="eliminaDial('${q.id}', '${nomeStudente}')">✖️</button>
                                </div>`;
                            });
                        } else {
                            if (!miaRisposta || miaRisposta.stato === 'giallo') {
    html += `
    <div style="margin-top: 5px; display: flex; gap: 10px; align-items: center;">
        <input type="text" id="input_dial_${q.id}" class="input-didattico" placeholder="Rispondi..."> 
        <button onclick="inviaRispostaDial('${q.id}')" class="btn-submit btn-large">
         Invia
        </button>
    </div>`;
}
                            if (miaRisposta) {
                                html += `<div style="padding:5px; background:${miaRisposta.stato === 'verde' ? '#d4edda' : miaRisposta.stato === 'giallo' ? '#fff3cd' : '#f8f9fa'}">
                                    ${miaRisposta.testo} ${miaRisposta.stato === 'verde' ? '✅' : miaRisposta.stato === 'giallo' ? '🟡 Riscrivi' : '⏳'}
                                </div>`;
                            }
                        }
                        bloccoEsercizio.innerHTML = html;
                    });
                });
            });
        }

     // ==========================================
        // LOGICA FIREBASE: PRESENTAZIONE PERSONALE
        // ==========================================

        window.inviaRispostaPres = function(campoId) {
            const inputField = document.getElementById(`input_pres_${campoId}`);
            const testo = inputField.value;
            if (testo.trim() === "") return alert("Scrivi qualcosa!");
            
            set(ref(db, `${BASE_PATH}/presentazione/${myUserName}/${campoId}`), {
                testo: testo,
                stato: 'attesa',
                timestamp: Date.now()
            });
        };

        window.valutaPres = function(campoId, studentName, stato) {
            update(ref(db, `${BASE_PATH}/presentazione/${studentName}/${campoId}`), { stato: stato });
        };

        window.eliminaPres = function(campoId, studentName) {
    if(confirm("Vuoi cancellare la risposta di " + studentName + " per questo campo?")) {
        remove(ref(db, `${BASE_PATH}/presentazione/${studentName}/${campoId}`));
    }
};

        // Ascoltatore per ogni campo della presentazione
        if (ConfigLezione && ConfigLezione.presentazionePersonale) {
            ConfigLezione.presentazionePersonale.campi.forEach(campo => {
                onValue(ref(db, `${BASE_PATH}/presentazione`), (snap) => {
                    const blocco = document.getElementById(`blocco_dinamico_pres_${campo.id}`);
                    if (!blocco) return;

                    let html = "";
                    const datiTutti = snap.val() || {};
                    
                    if (isDocente) {
    html += `<div><strong>Risposte Studenti:</strong></div>`;
    Object.keys(datiTutti).forEach(nomeStudente => {
        const data = datiTutti[nomeStudente][campo.id];
        if(data) {
            html += `<div style="border-bottom: 1px solid #eee; padding: 5px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <b>${nomeStudente}:</b> ${data.testo} 
                    <span style="font-size:1.2em;">${data.stato === 'verde' ? '🟢' : data.stato === 'giallo' ? '🟡' : '⏳'}</span>
                </div>
                <div>
                    <button onclick="valutaPres('${campo.id}', '${nomeStudente}', 'verde')">🟢</button>
                    <button onclick="valutaPres('${campo.id}', '${nomeStudente}', 'giallo')">🟡</button>
                    <button onclick="eliminaPres('${campo.id}', '${nomeStudente}')" style="background:transparent; border:none; color:red; cursor:pointer;" title="Cancella">✖️</button>
                </div>
            </div>`;
        }
    });
}
            else {
                        const miaRisposta = datiTutti[myUserName] ? datiTutti[myUserName][campo.id] : null;
                        if (!miaRisposta || miaRisposta.stato === 'giallo') {
    html += `
    <div style="margin-top: 5px; display: flex; gap: 10px; align-items: center;">
        <input type="text" id="input_pres_${campo.id}" class="input-didattico" placeholder="${campo.suggerimento}"> 
        <button onclick="inviaRispostaPres('${campo.id}')" class="btn-submit btn-large">
         Invia
        </button>
    </div>`;
}
                        if (miaRisposta) {
                            html += `<div style="padding:5px; background:${miaRisposta.stato === 'verde' ? '#d4edda' : miaRisposta.stato === 'giallo' ? '#fff3cd' : '#f8f9fa'}">
                                ${miaRisposta.testo} ${miaRisposta.stato === 'verde' ? '✅' : miaRisposta.stato === 'giallo' ? '🟡 Riscrivi' : '⏳'}
                            </div>`;
                        }
                    }
                    blocco.innerHTML = html;
                });
            });
        }

     // ==========================================
// LOGICA AUTOVALUTAZIONE (3 LIVELLI: SÌ, NON SONO SICURO, NO)
// ==========================================

window.inviaAutovalutazione = function(objId, stato) {
    set(ref(db, `${BASE_PATH}/autovalutazione/${myUserName}/${objId}`), {
        stato: stato, // 'verde', 'giallo', 'rosso'
        timestamp: Date.now()
    });
};

     window.eliminaAutovalutazione = function(objId, studentName) {
    if(confirm("Vuoi resettare la risposta di " + studentName + " per questo obiettivo?")) {
        remove(ref(db, `${BASE_PATH}/autovalutazione/${studentName}/${objId}`));
    }
};

onValue(ref(db, `${BASE_PATH}/autovalutazione`), (snapshot) => {
    const allData = snapshot.val() || {};
    const container = document.getElementById('autovalutazione-main-container');
    if (!container) return;

    // Configurazione 3 livelli
    const scale = {
        'verde':  { color: '#d4edda', label: 'Sì', icon: '🟢' },
        'giallo': { color: '#fff3cd', label: 'Sì, ma non sono sicuro', icon: '🟡' },
        'rosso':  { color: '#f8d7da', label: 'No', icon: '🔴' }
    };

    if (isDocente) {
        // --- VISTA DOCENTE: TABELLA ---
        let html = `<table style="width:100%; border-collapse:collapse; font-size: 0.8em; margin-top:10px;">
                    <tr style="background:#f4f4f4;"><th>Studente</th>`;
        
        // Usiamo shortLabel invece di substring
        ConfigLezione.autovalutazione.obiettivi.forEach(obj => {
            html += `<th style="padding:8px; border:1px solid #ddd;">${obj.shortLabel}</th>`;
        });
        html += `</tr>`;

        Object.keys(allData).forEach(studente => {
            html += `<tr><td style="border:1px solid #ddd; padding:8px; font-weight:bold;">${studente}</td>`;
            
            ConfigLezione.autovalutazione.obiettivi.forEach(obj => {
                const stato = allData[studente][obj.id] ? allData[studente][obj.id].stato : null;
                const config = scale[stato] || { color: '#eee', icon: '-' };
                
                // Aggiungiamo il tasto X solo se esiste una risposta (stato diverso da null)
                let deleteBtn = "";
                if (stato) {
                    deleteBtn = `<button onclick="eliminaAutovalutazione('${obj.id}', '${studente}')" 
                                 style="background:none; border:none; color:red; cursor:pointer; font-size:10px; margin-left:5px;" 
                                 title="Resetta risposta">✖️</button>`;
                }

                html += `<td style="border:1px solid #ddd; padding:8px; text-align:center; background:${config.color};">
                            ${config.icon} ${deleteBtn}
                         </td>`;
            });
            html += `</tr>`;
        });
        html += `</table>`;
        container.innerHTML = `<h4>Riepilogo Classe</h4>` + html;
    } else {
      
     // --- VISTA STUDENTE: 3 BOTTONI ---
        let html = `<div style="display:flex; flex-direction:column; gap:10px;">`;
        ConfigLezione.autovalutazione.obiettivi.forEach(obj => {
            const myStatus = allData[myUserName] ? (allData[myUserName][obj.id] ? allData[myUserName][obj.id].stato : null) : null;
            
            html += `<div style="padding:10px; background: #fff; border: 1px solid #ddd; border-radius: 5px;">
                        <div style="margin-bottom:8px; font-weight:bold;">${obj.testo}</div>
                        <div style="display:flex; gap:10px;">
                            ${Object.keys(scale).map(key => `
                                <button onclick="inviaAutovalutazione('${obj.id}', '${key}')" 
                                        style="flex:1; padding:8px; cursor:pointer; 
                                        border: ${myStatus === key ? '2px solid black' : '1px solid #ccc'}; 
                                        background: ${scale[key].color}; border-radius:4px;">
                                    ${scale[key].icon} ${scale[key].label}
                                </button>
                            `).join('')}
                        </div>
                     </div>`;
        });
        html += `</div>`;
        container.innerHTML = html;
    }
});
     

     
    </script>
