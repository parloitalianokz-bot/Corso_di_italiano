<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lezione Interattiva</title>
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #e74c3c; --bg-color: #fcf8f2; --text-color: #34495e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; padding: 20px; margin: 0; }
        .main-container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary-color); margin-bottom: 5px; }
        .subtitle { font-style: italic; color: #7f8c8d; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44, 62, 80, 0.95); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 8px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 90%; max-width: 400px; }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; text-align: center; border: 2px solid #cbd5e0; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        .login-box button { background: var(--primary-color); color: white; padding: 12px 20px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; }
        .didactic-block { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; border-left: 5px solid var(--primary-color); }
        .board-container { background: #3a475d; padding: 12px; border-radius: 6px; margin-top: 15px; }
        .board-toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; background: #4a5568; color: white; }
        .action-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
        button { padding: 6px 12px; font-size: 12px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .btn-write { background: #4CAF50; color: white; }
        .btn-submit { background: #9b59b6; color: white; }
        .btn-clear { background: var(--accent-color); color: white; }
        .editable-board { width: 100%; min-height: 80px; padding: 10px; border: 2px solid #4a5568; background: #ffffff; color: #2d3748; white-space: pre-wrap; word-wrap: break-word; }
        .accordion-header { background-color: #ecf0f1; padding: 15px; cursor: pointer; border: 1px solid #bdc3c7; margin-top: 10px; font-weight: bold; display: flex; justify-content: space-between; }
        .accordion-content { display: none; padding: 15px; border: 1px solid #bdc3c7; border-top: none; background: white; }
        .quiz-box { background: white; padding: 20px; border-radius: 8px; border: 1px solid #cbd5e0; margin-bottom: 20px; }
        .btn-elimina { color: #e74c3c; background: transparent; border: 1px solid #e74c3c; cursor: pointer; padding: 2px 5px; }
    </style>
    <link rel="icon" href="data:,">
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>Benvenuti in classe! 🇮🇹</h2>
            <input type="text" id="username-input" placeholder="Il tuo nome">
            <select id="group-select" style="width: 100%; padding: 10px; margin: 10px 0;">
                <option value="Venezia">Gruppo Venezia</option>
                <option value="Milano">Gruppo Milano</option>
            </select>
            <button onclick="entraInClasse()">Entra</button>
        </div>
    </div>

    <div class="main-container">
        <div style="text-align: right; margin-bottom: 10px;">
            <button onclick="esciDallaClasse()" style="background:#e74c3c; color:white; padding:5px 10px; border:none; border-radius:4px; cursor:pointer;">Esci 🚪</button>
        </div>
        <div class="header">
            <div id="user-info-badge" style="font-size: 0.9rem; color: #7f8c8d; margin-bottom: 10px;"></div>
            <h1 id="titolo-lezione">Caricamento...</h1>
            <p id="sottotitolo-lezione" class="subtitle"></p>
        </div>
        <div id="contenitore-dinamico"></div>
    </div>

    <script type="module">
        import { RegistroCorso } from "../studenti.js";
        
        const myUserName = localStorage.getItem('parlo_italiano_username') || "";
        const logOverlay = document.getElementById('login-overlay');
        if (myUserName && logOverlay) logOverlay.style.display = 'none';

        window.entraInClasse = function() {
            const nameInput = document.getElementById('username-input').value.trim();
            const groupInput = document.getElementById('group-select').value;
            const gruppoInfo = RegistroCorso[groupInput];
            if (gruppoInfo && gruppoInfo.studenti.find(s => s.toLowerCase() === nameInput.toLowerCase())) {
                localStorage.setItem('parlo_italiano_username', nameInput);
                localStorage.setItem('parlo_italiano_group', groupInput);
                location.reload();
            } else { alert("Accesso negato o gruppo errato."); }
        };

        window.esciDallaClasse = function() {
            localStorage.removeItem('parlo_italiano_username');
            localStorage.removeItem('parlo_italiano_group');
            location.reload();
        };
    </script>

    <script type="module">
        import { ConfigLezione } from "./dati-lezione.js";
        import { RegistroCorso } from "../studenti.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const myUserName = localStorage.getItem('parlo_italiano_username') || "";
        const myGroup = localStorage.getItem('parlo_italiano_group') || "default";
        
        const app = initializeApp({ databaseURL: "https://esercizi-parlo-italiano-default-rtdb.europe-west1.firebasedatabase.app/" });
        const db = getDatabase(app);
        const BASE_PATH = `${ConfigLezione?.idFirebase || "lezione_default"}/${myGroup}`;

        // Verifica Docente
        let isDocente = false;
        const gruppoCorrente = RegistroCorso[myGroup];
        if (gruppoCorrente) {
            const userLow = myUserName.toLowerCase();
            const ruoli = [...(Array.isArray(gruppoCorrente.docenteRuolo) ? gruppoCorrente.docenteRuolo : []), ...(Array.isArray(gruppoCorrente.docenteSupporto) ? gruppoCorrente.docenteSupporto : [])];
            if (ruoli.some(r => r.toLowerCase() === userLow)) isDocente = true;
        }

        // Listener Bacheca Tabella (Fix per docente)
        if (isDocente) {
            onValue(ref(db, `${BASE_PATH}/grammatica_tabella`), (snap) => {
                const panel = document.getElementById('pannello_docente_tabella');
                if (panel) {
                    if (!snap.exists()) {
                        panel.innerHTML = "<h3>Risultati Tabella:</h3><p>Nessuna risposta inviata finora.</p>";
                    } else {
                        let html = "<h3>Risultati Tabella Studenti:</h3>";
                        snap.forEach(child => {
                            const data = child.val();
                            const dettagli = Object.entries(data.risposte || {}).map(([p, v]) => `<b>${p}:</b> ${v}`).join(' | ');
                            html += `<div style="border-bottom:1px solid #ccc; padding:10px;"><b>Studente: ${child.key}</b><br>${dettagli}</div>`;
                        });
                        panel.innerHTML = html;
                    }
                }
            });
        }

        // Verifica e Invia Tabella (Versione corretta)
        window.verificaEInviaTabella = function() {
            const d = ConfigLezione.grammatica.fase4;
            let invioDati = {};
            d.tabella.forEach((riga, index) => {
                const input = document.getElementById(`tab_input_${index}`);
                invioDati[riga.pronome] = input.value;
                input.disabled = true;
            });
            set(ref(db, `${BASE_PATH}/grammatica_tabella/${myUserName}`), { author: myUserName, risposte: invioDati });
            document.getElementById('feedback_sintesi').innerText = "Inviato!";
        };

        // UI Generazione (Semplificata)
        document.getElementById('titolo-lezione').innerText = ConfigLezione.titolo;
        // [Inserisci qui il resto del codice che genera i blocchi dinamici basati su ConfigLezione...]
    </script>
</body>
</html>
